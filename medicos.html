<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MediTurno | Médicos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<div class="sidebar">

    <div class="logo">
        🏥 MediTurno
    </div>

    <ul>

        <li><a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>

        <li><a href="pacientes.html"><i class="bi bi-people-fill"></i> Pacientes</a></li>

        <li class="activo"><a href="medicos.html"><i class="bi bi-person-badge-fill"></i> Médicos</a></li>

        <li><a href="especialidades.html"><i class="bi bi-heart-pulse-fill"></i> Especialidades</a></li>

        <li><a href="citas.html"><i class="bi bi-calendar-check-fill"></i> Citas</a></li>

        <li><a href="reportes.html"><i class="bi bi-bar-chart-fill"></i> Reportes</a></li>

        <li><a href="index.html"><i class="bi bi-box-arrow-left"></i> Cerrar sesión</a></li>

    </ul>

</div>

<div class="contenido">

    <div class="encabezado">

        <div>

            <h2>Médicos</h2>

            <span>Administración del personal médico.</span>

        </div>

    </div>

    <div class="card p-4 mb-4">

        <div class="row">

            <div class="col-md-4 mb-3">

                <label>Nombre</label>

                <input
                    type="text"
                    id="nombre"
                    class="form-control">

            </div>

            <div class="col-md-4 mb-3">

                <label>Cédula</label>

                <input
                    type="text"
                    id="cedula"
                    class="form-control">

            </div>

            <div class="col-md-4 mb-3">

                <label>Teléfono</label>

                <input
                    type="text"
                    id="telefono"
                    class="form-control">

            </div>

            <div class="col-md-6 mb-3">

                <label>Correo</label>

                <input
                    type="email"
                    id="correo"
                    class="form-control">

            </div>

            <div class="col-md-6 mb-3">

                <label>Especialidad</label>

                <select
                    id="especialidad"
                    class="form-select">

                    <option value="">Seleccione...</option>

                </select>

            </div>

        </div>

        <button
            class="btn btn-primary"
            onclick="guardarMedico()">

            <i class="bi bi-save"></i>

            Guardar

        </button>

    </div>

    <div class="card p-3">

        <table class="table table-hover">

            <thead>

                <tr>

                    <th>Nombre</th>

                    <th>Cédula</th>

                    <th>Especialidad</th>

                    <th>Teléfono</th>

                    <th>Acciones</th>

                </tr>

            </thead>

            <tbody id="tablaMedicos">

            </tbody>

        </table>

    </div>

</div>

<script src="js/medicos.js"></script>

</body>

</html>
