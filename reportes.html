<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MediTurno | Reportes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/dashboard.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="sidebar">

    <div class="logo">🏥 MediTurno</div>

    <ul>

        <li><a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>

        <li><a href="pacientes.html"><i class="bi bi-people-fill"></i> Pacientes</a></li>

        <li><a href="medicos.html"><i class="bi bi-person-badge-fill"></i> Médicos</a></li>

        <li><a href="especialidades.html"><i class="bi bi-heart-pulse-fill"></i> Especialidades</a></li>

        <li><a href="citas.html"><i class="bi bi-calendar-check-fill"></i> Citas</a></li>

        <li class="activo"><a href="reportes.html"><i class="bi bi-bar-chart-fill"></i> Reportes</a></li>

        <li><a href="index.html"><i class="bi bi-box-arrow-left"></i> Cerrar sesión</a></li>

    </ul>

</div>

<div class="contenido">

    <div class="encabezado">

        <h2>Reportes del Sistema</h2>

    </div>

    <div class="row">

        <div class="col-md-3">

            <div class="card tarjeta azul">

                <h6>Pacientes</h6>

                <h2 id="rpPacientes">0</h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card tarjeta verde">

                <h6>Médicos</h6>

                <h2 id="rpMedicos">0</h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card tarjeta naranja">

                <h6>Especialidades</h6>

                <h2 id="rpEspecialidades">0</h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card tarjeta rojo">

                <h6>Citas</h6>

                <h2 id="rpCitas">0</h2>

            </div>

        </div>

    </div>

    <div class="card mt-5 p-4">

        <h5 class="mb-4">

            Estadísticas Generales

        </h5>

        <canvas id="grafico"></canvas>

    </div>

    <div class="mt-4">

        <button class="btn btn-success" onclick="window.print()">

            <i class="bi bi-printer"></i>

            Imprimir Reporte

        </button>

    </div>

</div>

<script src="js/reportes.js"></script>

</body>

</html>
