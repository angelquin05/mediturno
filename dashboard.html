<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MediTurno | Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<div class="sidebar">

    <div class="logo">

        🏥 MediTurno

    </div>

    <ul>

        <li class="activo">

            <a href="dashboard.html">

                <i class="bi bi-speedometer2"></i>

                Dashboard

            </a>

        </li>

        <li>

            <a href="pacientes.html">

                <i class="bi bi-people-fill"></i>

                Pacientes

            </a>

        </li>

        <li>

            <a href="medicos.html">

                <i class="bi bi-person-badge-fill"></i>

                Médicos

            </a>

        </li>

        <li>

            <a href="especialidades.html">

                <i class="bi bi-heart-pulse-fill"></i>

                Especialidades

            </a>

        </li>

        <li>

            <a href="citas.html">

                <i class="bi bi-calendar-check-fill"></i>

                Citas

            </a>

        </li>

        <li>

            <a href="reportes.html">

                <i class="bi bi-bar-chart-fill"></i>

                Reportes

            </a>

        </li>

        <li>

            <a href="index.html">

                <i class="bi bi-box-arrow-left"></i>

                Cerrar sesión

            </a>

        </li>

    </ul>

</div>

<div class="contenido">

    <div class="encabezado">

        <div>

            <h2>

                Dashboard

            </h2>

            <span id="fecha"></span>

        </div>

        <div class="usuario">

            <i class="bi bi-person-circle"></i>

            Administrador

        </div>

    </div>

    <div class="row g-4 mt-2">

        <div class="col-md-3">

            <div class="card tarjeta azul">

                <h6>Pacientes</h6>

                <h2 id="totalPacientes">0</h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card tarjeta verde">

                <h6>Médicos</h6>

                <h2 id="totalMedicos">0</h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card tarjeta naranja">

                <h6>Citas</h6>

                <h2 id="totalCitas">0</h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card tarjeta rojo">

                <h6>Especialidades</h6>

                <h2 id="totalEspecialidades">0</h2>

            </div>

        </div>

    </div>

    <div class="card mt-5">

        <div class="card-header">

            Últimas citas registradas

        </div>

        <table class="table">

            <thead>

                <tr>

                    <th>Paciente</th>

                    <th>Médico</th>

                    <th>Fecha</th>

                    <th>Estado</th>

                </tr>

            </thead>

            <tbody id="tablaCitas">

            </tbody>

        </table>

    </div>

</div>

<script src="js/dashboard.js"></script>

</body>

</html>
