<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MediTurno | Iniciar Sesión</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="container-fluid">

        <div class="row vh-100">

            <!-- Panel izquierdo -->

            <div class="col-lg-7 d-none d-lg-flex panel-izquierdo">

                <div class="contenido">

                    <h1 class="logo">

                        🏥 MediTurno

                    </h1>

                    <h3>

                        Sistema Web para la Gestión de Citas Médicas

                    </h3>

                    <p>

                        Administre pacientes, médicos, especialidades y citas médicas desde un solo lugar.

                    </p>

                    <img src="https://cdn-icons-png.flaticon.com/512/2785/2785544.png"
                        class="img-fluid imagen-principal">

                </div>

            </div>

            <!-- Panel derecho -->

            <div class="col-lg-5 col-12 panel-derecho">

                <div class="login">

                    <div class="text-center mb-4">

                        <i class="bi bi-hospital login-icon"></i>

                        <h2>

                            Bienvenido

                        </h2>

                        <p>

                            Inicie sesión para continuar

                        </p>

                    </div>

                    <form id="loginForm">

                        <div class="mb-3">

                            <label>

                                Correo electrónico

                            </label>

                            <input
                                type="email"
                                id="correo"
                                class="form-control"
                                placeholder="admin@mediturno.com"
                                required>

                        </div>

                        <div class="mb-4">

                            <label>

                                Contraseña

                            </label>

                            <input
                                type="password"
                                id="password"
                                class="form-control"
                                placeholder="********"
                                required>

                        </div>

                        <button
                            class="btn btn-primary w-100">

                            <i class="bi bi-box-arrow-in-right"></i>

                            Ingresar

                        </button>

                    </form>

                    <hr>

                    <div class="text-center">

                        <small>

                            Usuario:

                            <strong>

                                admin@mediturno.com

                            </strong>

                            <br>

                            Contraseña:

                            <strong>

                                12345

                            </strong>

                        </small>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
