<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MediTurno | Especialidades</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<div class="sidebar">

    <div class="logo">

        🏥 MediTurno

    </div>

    <ul>

        <li><a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>

        <li><a href="pacientes.html"><i class="bi bi-people-fill"></i> Pacientes</a></li>

        <li><a href="medicos.html"><i class="bi bi-person-badge-fill"></i> Médicos</a></li>

        <li class="activo"><a href="#"><i class="bi bi-heart-pulse-fill"></i> Especialidades</a></li>

        <li><a href="citas.html"><i class="bi bi-calendar-check-fill"></i> Citas</a></li>

        <li><a href="reportes.html"><i class="bi bi-bar-chart-fill"></i> Reportes</a></li>

        <li><a href="index.html"><i class="bi bi-box-arrow-left"></i> Cerrar sesión</a></li>

    </ul>

</div>

<div class="contenido">

    <div class="encabezado">

        <h2>Especialidades Médicas</h2>

    </div>

    <div class="card p-4">

        <input type="hidden" id="idEspecialidad">

        <div class="row">

            <div class="col-md-5">

                <label>Nombre</label>

                <input
                    type="text"
                    id="nombreEspecialidad"
                    class="form-control">

            </div>

            <div class="col-md-7">

                <label>Descripción</label>

                <input
                    type="text"
                    id="descripcionEspecialidad"
                    class="form-control">

            </div>

        </div>

        <div class="mt-3">

            <button
                class="btn btn-primary"
                onclick="guardarEspecialidad()">

                <i class="bi bi-save"></i>

                Guardar

            </button>

            <button
                class="btn btn-secondary"
                onclick="limpiarEspecialidad()">

                Limpiar

            </button>

        </div>

    </div>

    <div class="card mt-4 p-3">

        <table class="table table-hover">

            <thead>

                <tr>

                    <th>Especialidad</th>

                    <th>Descripción</th>

                    <th width="150">Acciones</th>

                </tr>

            </thead>

            <tbody id="tablaEspecialidades">

            </tbody>

        </table>

    </div>

</div>

<script src="js/especialidades.js"></script>

</body>

</html>
