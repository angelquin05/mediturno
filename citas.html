<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MediTurno | Citas Médicas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<div class="sidebar">

    <div class="logo">🏥 MediTurno</div>

    <ul>

        <li><a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>

        <li><a href="pacientes.html"><i class="bi bi-people-fill"></i> Pacientes</a></li>

        <li><a href="medicos.html"><i class="bi bi-person-badge-fill"></i> Médicos</a></li>

        <li><a href="especialidades.html"><i class="bi bi-heart-pulse-fill"></i> Especialidades</a></li>

        <li class="activo"><a href="citas.html"><i class="bi bi-calendar-check-fill"></i> Citas</a></li>

        <li><a href="reportes.html"><i class="bi bi-bar-chart-fill"></i> Reportes</a></li>

        <li><a href="index.html"><i class="bi bi-box-arrow-left"></i> Cerrar sesión</a></li>

    </ul>

</div>

<div class="contenido">

    <div class="encabezado">

        <h2>Gestión de Citas Médicas</h2>

    </div>

    <div class="card p-4 mb-4">

        <div class="row">

            <div class="col-md-6 mb-3">

                <label>Paciente</label>

                <select id="paciente" class="form-select">

                    <option value="">Seleccione...</option>

                </select>

            </div>

            <div class="col-md-6 mb-3">

                <label>Médico</label>

                <select id="medico" class="form-select">

                    <option value="">Seleccione...</option>

                </select>

            </div>

            <div class="col-md-3 mb-3">

                <label>Fecha</label>

                <input type="date" id="fecha" class="form-control">

            </div>

            <div class="col-md-3 mb-3">

                <label>Hora</label>

                <input type="time" id="hora" class="form-control">

            </div>

            <div class="col-md-3 mb-3">

                <label>Estado</label>

                <select id="estado" class="form-select">

                    <option>Programada</option>

                    <option>Atendida</option>

                    <option>Cancelada</option>

                </select>

            </div>

            <div class="col-md-3 mb-3">

                <label>Motivo</label>

                <input type="text" id="motivo" class="form-control">

            </div>

        </div>

        <button class="btn btn-primary" onclick="guardarCita()">

            <i class="bi bi-save"></i>

            Guardar Cita

        </button>

    </div>

    <div class="card p-3">

        <table class="table table-hover">

            <thead>

                <tr>

                    <th>Paciente</th>

                    <th>Médico</th>

                    <th>Fecha</th>

                    <th>Hora</th>

                    <th>Estado</th>

                    <th>Acciones</th>

                </tr>

            </thead>

            <tbody id="tablaCitas">

            </tbody>

        </table>

    </div>

</div>

<script src="js/citas.js"></script>

</body>

</html>
